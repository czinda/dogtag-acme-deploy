# =============================================================================
# Dogtag PKI — Podman Desktop / Kubernetes YAML
#
# Two containers in one pod sharing a network namespace:
#   - ds:   389 Directory Server (port 3389)
#   - ca:   Dogtag CA + ACME Responder (ports 8443, 8080)
#
# ACME runs as a webapp inside the CA's Tomcat (Dogtag's intended design).
#
# Podman Desktop: Pods tab → Play Kubernetes YAML → select this file
# CLI: podman kube play dogtag-pki-pod.yaml
# Teardown: podman kube down dogtag-pki-pod.yaml
#
# Prerequisites:
#   Build images first (see launch-podman-desktop.sh)
#
# Generated-by: Claude Code (claude.ai/code)
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: dogtag-pki
  labels:
    app: dogtag-pki
spec:
  hostname: pki.local
  containers:
    # ─── 389 Directory Server ────────────────────────────────────────────
    - name: ds
      image: localhost/dogtag-ds:latest
      env:
        - name: DS_PORT
          value: "3389"
        - name: DS_PASSWORD
          value: "Secret.123"
      ports:
        - containerPort: 3389
          hostPort: 3389
          protocol: TCP
      securityContext:
        privileged: true

    # ─── Dogtag CA + ACME Responder ──────────────────────────────────────
    - name: ca
      image: localhost/dogtag-ca:latest
      env:
        - name: DS_HOST
          value: "localhost"
        - name: DS_PORT
          value: "3389"
        - name: DS_PASSWORD
          value: "Secret.123"
        - name: CA_ADMIN_PASSWORD
          value: "Secret.123"
        - name: CA_HOSTNAME
          value: "pki.local"
      ports:
        - containerPort: 8443
          hostPort: 8443
          protocol: TCP
        - containerPort: 8080
          hostPort: 8080
          protocol: TCP
      securityContext:
        privileged: true
