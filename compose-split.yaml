# =============================================================================
# Dogtag PKI — Multi-Container Deployment (DS + CA + ACME)
#
# Usage:
#   # Build images first (requires RHSM creds):
#   source <(op read "op://Private/age-private-key/notesPlain" | age -d -i - ~/.claude/.env.age)
#   podman build --platform linux/amd64 --build-arg RHSM_USER=$RHSM_USERNAME --build-arg RHSM_PASS=$RHSM_PASSWORD -t dogtag-ds -f containers/ds/Containerfile .
#   podman build --platform linux/amd64 --build-arg RHSM_USER=$RHSM_USERNAME --build-arg RHSM_PASS=$RHSM_PASSWORD -t dogtag-ca -f containers/ca/Containerfile .
#   podman build --platform linux/amd64 --build-arg RHSM_USER=$RHSM_USERNAME --build-arg RHSM_PASS=$RHSM_PASSWORD -t dogtag-acme-split -f containers/acme/Containerfile .
#
#   # Start the stack (uses pre-built images):
#   podman compose -f compose-split.yaml up -d
#
#   # Watch deployment progress:
#   podman compose -f compose-split.yaml logs -f
#
#   # Check health:
#   podman compose -f compose-split.yaml ps
#
#   # Verify endpoints:
#   curl -sk https://localhost:8443/ca/admin/ca/getStatus   # CA
#   curl -sk https://localhost:8444/acme/directory           # ACME
#
#   # Tear down:
#   podman compose -f compose-split.yaml down -v
#
# Generated-by: Claude Code (claude.ai/code)
# =============================================================================
services:
  # ─── 389 Directory Server ──────────────────────────────────────────────────
  ds:
    container_name: dogtag-ds
    hostname: ds.pki.local
    image: dogtag-ds:latest
    privileged: true
    ports:
      - "3389:3389"
    environment:
      DS_PORT: "3389"
      DS_PASSWORD: "${DS_PASSWORD:-Secret.123}"
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost:3389", "-b", "", "-s", "base"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    stop_signal: SIGRTMIN+3

  # ─── Dogtag Certificate Authority ──────────────────────────────────────────
  ca:
    container_name: dogtag-ca
    hostname: ca.pki.local
    image: dogtag-ca:latest
    privileged: true
    ports:
      - "8443:8443"
      - "8080:8080"
    environment:
      DS_HOST: ds
      DS_PORT: "3389"
      DS_PASSWORD: "${DS_PASSWORD:-Secret.123}"
      CA_ADMIN_PASSWORD: "${CA_ADMIN_PASSWORD:-Secret.123}"
      CA_HOSTNAME: ca
    depends_on:
      ds:
        condition: service_healthy
    volumes:
      - shared-certs:/shared
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8443/ca/admin/ca/getStatus"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s
    stop_signal: SIGRTMIN+3

  # ─── ACME Responder ────────────────────────────────────────────────────────
  acme:
    container_name: dogtag-acme
    hostname: acme.pki.local
    image: dogtag-acme-split:latest
    privileged: true
    ports:
      - "8444:8443"
      - "8081:8080"
    environment:
      DS_HOST: ds
      DS_PORT: "3389"
      DS_PASSWORD: "${DS_PASSWORD:-Secret.123}"
      CA_HOST: ca
      CA_PORT: "8443"
      CA_ADMIN_PASSWORD: "${CA_ADMIN_PASSWORD:-Secret.123}"
    depends_on:
      ds:
        condition: service_healthy
      ca:
        condition: service_healthy
    volumes:
      - shared-certs:/shared:ro
    healthcheck:
      test: ["CMD", "curl", "-sk", "https://localhost:8443/acme/directory"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s
    stop_signal: SIGRTMIN+3

volumes:
  shared-certs:
